<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Business Card - Sai Deepak</title>
    <!-- A-Frame and AR.js - using stable CDN versions -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      .loading-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #02040a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #00f0ff;
        font-family: 'Courier New', monospace;
        z-index: 9999;
        transition: opacity 0.5s;
      }
      .loading-overlay.hidden { opacity: 0; pointer-events: none; }
      .loading-text { font-size: 18px; margin-bottom: 10px; }
      .loading-hint { font-size: 14px; color: #94a3b8; text-align: center; line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="loading-overlay" id="loading">
      <p class="loading-text">> INITIALIZING AR MODULE...</p>
      <p class="loading-hint">
        Allow camera access when prompted.<br/>
        Point your camera at a Hiro marker.
      </p>
    </div>

    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true; antialias: true;"
    >
      <!-- Using hiro marker -->
      <a-marker preset="hiro">
        <a-entity position="0 0.5 0" rotation="-90 0 0">
          <!-- Business Card Background -->
          <a-plane width="3" height="2" color="#02040a" material="opacity: 0.9; transparent: true"></a-plane>
          
          <!-- Border -->
          <a-plane width="3.1" height="2.1" position="0 0 -0.01" color="#00f0ff"></a-plane>
          
          <!-- Text Elements -->
          <a-text value="SAI DEEPAK" position="-1.3 0.6 0.01" width="6" color="#00f0ff" font="kelsonsans"></a-text>
          <a-text value="XR & AI Systems Architect" position="-1.3 0.2 0.01" width="3" color="#ffffff"></a-text>
          
          <a-text value="> 6+ Years Experience" position="-1.3 -0.2 0.01" width="2" color="#f5c051"></a-text>
          <a-text value="> Unity | Unreal | WebXR | AI" position="-1.3 -0.5 0.01" width="2" color="#f5c051"></a-text>
          <a-text value="> Ready for Global Deployment" position="-1.3 -0.8 0.01" width="2" color="#f5c051"></a-text>
          
          <!-- Holographic Cube Decoration -->
          <a-box position="1 0 0.5" scale="0.5 0.5 0.5" material="color: #00f0ff; wireframe: true" animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"></a-box>
        </a-entity>
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // Hide loading overlay once scene is loaded
      const scene = document.querySelector('a-scene');
      if (scene) {
        scene.addEventListener('loaded', function() {
          setTimeout(function() {
            document.getElementById('loading').classList.add('hidden');
          }, 1500);
        });
        // Fallback - hide after 5 seconds regardless
        setTimeout(function() {
          document.getElementById('loading').classList.add('hidden');
        }, 5000);
      }
    </script>
  </body>
</html>
